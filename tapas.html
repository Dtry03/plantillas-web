<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Bar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.css" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        .font-pacifico {
            font-family: 'pacifico', sans-serif;
            letter-spacing: 5px;
            }
        .titulos{
            letter-spacing: 10px;
        }
        body {
            font-family: 'Poppins', sans-serif;
            }
    </style>
    </head>
<body>
  <nav class="bg-green-700">
      <div class="max-w-screen-xl flex items-center justify-between mx-auto p-4">
          <span class="text-white font-bold font-pacifico text-3xl">al Carajo</span>

          <button data-collapse-toggle="navbar" type="button" class="md:hidden mx-4 text-white"><i data-lucide="menu" class="text-dark"></i></button>
          <button  data-modal-target="reserva-modal" data-modal-toggle="reserva-modal" type="button" class="md:hidden  bg-yellow-500 text-white  rounded px-4 hover:bg-yellow-600 text-xl">RESERVAR MESA</button>
         

          <div class="hidden md:flex gap-6 text-white font-semibold" >
              <a href="#" class="p-2 hover:text-yellow-500 text-xl">MENU</a>
              <a href="#" class="p-2 hover:text-yellow-500 text-xl">CONTACTO</a>
            <button  data-modal-target="reserva-modal" data-modal-toggle="reserva-modal" type="button" class="hidden md:block bg-yellow-500 text-white  rounded px-4 hover:bg-yellow-600 text-xl">RESERVAR MESA</button>
          </div>
      </div>
      
          <div class="hidden  gap-6 text-white font-semibold" id="navbar">
            <a href="#" class="p-2 hover:text-yellow-500 text-xl">MENU</a>
              <a href="#" class="p-2 hover:text-yellow-500 text-xl">CONTACTO</a>
             
          </div>  
  </nav>

  <section class="relative bg-[url(bar-tapas2.jpg)] bg-cover bg-bottom h-screen w-full mx-auto py-20 flex justify-center items-center">
    <div class="absolute inset-0 bg-black/60"></div>
    <div class="relative z-10 text-white text-center w-full  flex-col justify-center mx-auto">
      <h1 class="md:text-7xl font-bold pb-3 text-2xl font-pacifico titulos ">BAR DE TAPAS EN SANTA MARTA</h1>
      <p class="md:text-4xl md:pb-12 text-md pb-6 ">Disfruta de nuestro delicioso y variado menú</p>
    

    <button  class="bg-yellow-500 rounded px-5 py-3 md:text-3xl  text-md font-bold hover:bg-yellow-600"><a href="#carta">VER CARTA AHORA</a></button>
    </div>
  </section>
<section class="bg-yellow-500 py-8 antialiased  md:py-12 ">
  <div class="mx-auto max-w-screen-xl px-4 2xl:px-0">
    <!-- Heading & Filters -->
    <div class="mb-4 items-end justify-center space-y-4 sm:flex sm:space-y-0 md:mb-8">
      <div class="text-center">
  
         
        <h2 class="mt-3 md:text-6xl text-3xl font-semibold text-white sm:text-5xl titulos font-pacifico" id="catalogo">NUESTRA CARTA</h2>
      </div>
    </div>
    <div class="mb-4 grid gap-4 sm:grid-cols-1 md:mb-8 lg:grid-cols-1 xl:grid-cols-1">
      <div class="rounded-lg bg-green-700  shadow-sm flex flex-row-reverse ">
        <div class="h-56  bg-[url(tapa-1.jpg)] bg-cover bg-center  mx-auto  flex-1">
        </div>
        <div class="pt-6 text-center p-5 flex-1 flex  flex-col items-center justify-center">
          

          <a href="#" class="md:text-3xl text-md font-semibold leading-tight text-white hover:underline text">CROQUETAS DE JAMÓN SERRANO</a>
         <p class="text-3xl font-extrabold leading-tight text-white">10€</p>
         
          </div>
        </div>
      </div>

       <div class="mb-4 grid gap-4 sm:grid-cols-1 md:mb-8 lg:grid-cols-1 xl:grid-cols-1">
      <div class="rounded-lg bg-green-700  shadow-sm flex flex-row-reverse ">
        <div class="h-56  bg-[url(tapa-2.jpg)] bg-cover bg-[center_35%]  mx-auto  flex-1">
        </div>
        <div class="pt-6 text-center p-5 flex-1 flex  flex-col items-center justify-center">
          

          <a href="#" class="md:text-3xl text-md font-semibold leading-tight text-white hover:underline text">CEVICHE CLÁSICO</a>
         <p class="text-3xl font-extrabold leading-tight text-white">20€</p>
         
          </div>
        </div>
      </div>

       <div class="mb-4 grid gap-4 sm:grid-cols-1 md:mb-8 lg:grid-cols-1 xl:grid-cols-1">
      <div class="rounded-lg bg-green-700  shadow-sm flex flex-row-reverse ">
        <div class="h-56  bg-[url(tapa-3.jpg)] bg-cover bg-center  mx-auto  flex-1">
        </div>
        <div class="pt-6 text-center p-5 flex-1 flex  flex-col items-center justify-center">
          

          <a href="#" class="md:text-3xl text-md font-semibold leading-tight text-white hover:underline text">COCTEL AL CARAJO</a>
         <p class="text-3xl font-extrabold leading-tight text-white">15€</p>
         
          </div>
        </div>
      </div>
        

  </div>
  
     <div class="w-full text-center">
      <button type="button" class="rounded-md bg-green-700 px-5 py-2.5  text-white hover:bg-green-700">MOSTRAR MÁS</button>
    </div>
</section>

 <div id="reserva-modal" tabindex="-1" aria-hidden="true"
  class="hidden fixed top-0 left-0 right-0 z-50 justify-center items-center w-full h-full bg-black/50 flex">

  <div class="relative p-4 w-full max-w-md">

    <div class="relative bg-green-700 rounded-lg shadow text-white ">

      <!-- Header -->
      <div class="flex items-center justify-between p-4 ">
        <h3 class="text-xl font-semibold">
          Reservar mesa
        </h3>
        <button type="button" data-modal-hide="reserva-modal"
          class="text-white hover:text-yellow-500 text-2xl">
          &times;
        </button>
      </div>

      <!-- Body -->
      <div class="p-4 space-y-3">
        <input type="text" placeholder="Nombre" class="w-full  text-white p-2 rounded bg-green-800 placeholder-white">
        <input type="text" placeholder="Teléfono" class="w-full text-white p-2 rounded bg-green-800 placeholder-white">

        <input type="time" class="w-full  p-2 rounded bg-green-800">


        <input type="date" class="w-full  p-2 rounded bg-green-800">

        <button id="demo-btn" class="w-full bg-yellow-500 text-white font-semibold p-2 rounded hover:bg-yellow-600">
          Confirmar reserva
        </button>

        <p id="demo-msg" class="hidden text-yellow-500 font-semibold flex">
           <i data-lucide="check"></i>Esto es una demo de cómo funcionaría
        </p>
      </div>

    </div>
  </div>
</div>



<script src="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.js"></script>
       
<script src="https://cdn.jsdelivr.net/npm/lucide@1.7.0/dist/umd/lucide.min.js"></script>

<script>lucide.createIcons();</script>

<script>
  const btn= document.getElementById("demo-btn");
  const msg= document.getElementById("demo-msg");

  btn.addEventListener("click", ()=>{
    msg.classList.remove("hidden");

    setTimeout(()=>{
      document.querySelector('[data-modal-hide="reserva-modal"]').click();
    }, 1200);
  });
</script>

</body>
</html>
